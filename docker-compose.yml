version: "3.9"

services:
  backend:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    command: sh -c "composer install --no-interaction && php -S 0.0.0.0:8000 -t public/"
    environment:
      DATABASE_URL: "mysql://immouser:immopass@mysql:3306/immotrainer?serverVersion=8.0.32&charset=utf8mb4"

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: immotrainer
      MYSQL_USER: immouser
      MYSQL_PASSWORD: immopass
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data: